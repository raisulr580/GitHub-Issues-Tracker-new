
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
   <title>GitHub Issues Tracker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --primary: #0366d6;
      --active-tab: #6f42c1;
      --open: #2ecc71;
      --closed: #9b59b6;
      --gray: #7f8c8d;
      --light-gray: #f6f8fa;
      --deep-gray: #495057;
      --bug-text: #c62828;
      --bug-bg: #ffebee;
      --enhancement-text: #2e7d32;
      --enhancement-bg: #e8f5e9;
      --help-text: #e67e22;
      --help-bg: #fff0e6;
      --goodfirst-text: #27ae60;
      --goodfirst-bg: #e8f8f5;
      --doc-text: #8e44ad;
      --doc-bg: #f5ebfa;
      --other-text: #d35400;
      --other-bg: #fff5e6;
      --high: #c62828;
      --medium: #f57c00;
      --low: #adb5bd;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f6fa;
      color: #2c3e50;
      min-height: 100vh;
    }

    
    .navbar {
      background: white;
      border-bottom: 1px solid #dfe6e9;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.5rem;
      font-weight: 600;
      color: #24292e;
    }

    .brand img {
      height: 38px;
      width: auto;
    }

    .search-container {
      display: flex;
      gap: 8px;
      max-width: 380px;
      width: 100%;
    }

    .search-container input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 1rem;
    }

    .search-container button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      font-size: 1rem;
    }
    
    .tabs-container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .tab {
      padding: 10px 28px;
      font-size: 1rem;
      font-weight: 500;
      color: #586069;
      background: white;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 90px;
      text-align: center;
    }

 .tab.active {
  background: #0366d6; 
  color: white;
  border-color: #0366d6; 
  font-weight: 600;
  box-shadow: 0 2px 8px rgba(3,102,214,0.3); 
 }


    .tabs-underline {
      height: 1px;
      background: #e1e4e8;
      margin-bottom: 28px;
    }
